name: Daily Cybersecurity Telegram News

on:
  schedule:
    # 08:07 Asia/Hong_Kong is 00:07 UTC.
    # GitHub can delay or drop scheduled jobs near the top of the hour during high load.
    - cron: "7 0 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_TIMEZONE: Asia/Hong_Kong
          NEWS_MAX_ITEMS: "10"
          NEWS_LOOKBACK_HOURS: "72"
          NEWS_STATE_FILE: .news_state.json
        run: python cyber_news_feed.py

      - name: Commit digest state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .news_state.json
          git diff --cached --quiet && exit 0
          git commit -m "Update daily news state"
          git push
