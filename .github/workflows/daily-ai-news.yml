name: Daily AI Telegram News

on:
  schedule:
    # 09:10, 09:30, and 09:50 Asia/Hong_Kong are 01:10, 01:30, and 01:50 UTC.
    # GitHub can delay or drop scheduled jobs, so we schedule a few backups and
    # let the script skip once today's digest is sent.
    - cron: "10 1 * * *"
    - cron: "30 1 * * *"
    - cron: "50 1 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-ai-news
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_TIMEZONE: Asia/Hong_Kong
          NEWS_MAX_ITEMS: "10"
          NEWS_LOOKBACK_HOURS: "72"
          NEWS_TITLE: AI 每日情報摘要
          NEWS_TOPIC: ai
          NEWS_STATE_FILE: .news_state.json
        run: python cyber_news_feed.py
